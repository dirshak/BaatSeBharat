project:
  name: "Leadership Rhetoric Market Regime Prediction"
  version: "1.0.0"
  
data:
  mann_ki_baat:
    source: "https://www.pmindia.gov.in/en/mann-ki-baat/"
    num_episodes: 120
    start_date: "2014-10-03"
  
  market:
    source: "yahoo_finance"
    sectors:
      - symbol: "^NSEBANK"
        name: "Banking"
      - symbol: "^CNXIT"
        name: "IT"
      - symbol: "^NSEI"
        name: "Broad Market"
    start_date: "2014-10-03"
  
models:
  topic_modeling:
    n_topics: 10
    nmf_iterations: 500

  # Time-decay + importance weighting for the prediction engine's use of
  # historical speeches (src/models/topic_weighting.py). A speech's final
  # weight = decay(age) * importance(speech), so recent speeches are
  # favored by default (decay), but a historically high-impact speech can
  # still carry meaningful weight even when old (importance floor).
  speech_weighting:
    half_life_days: 180        # decay(age) = 0.5 ** (age_days / half_life_days)
    reaction_cap: 0.05         # abnormal_return magnitude treated as "max importance" (5%)
    importance_floor: 0.3      # minimum importance even for low-salience/low-reaction speeches
    topic_weight: 0.5          # importance blend: topic-concentration share
    reaction_weight: 0.5       # importance blend: historical-market-reaction share

  # Groq-hosted Llama classifier: maps each speech's dominant topic onto the
  # tracked 15-company universe (prediction_engine.COMPANY_UNIVERSE) with a
  # strength/sentiment judgment. blend_weight controls how much this signal
  # moves the existing NMF/FinBERT-derived baseline in prediction_engine.py
  # (0 = ignore LLM signal entirely, 1 = LLM signal only).
  groq_classifier:
    model: "llama-3.3-70b-versatile"
    temperature: 0.1
    max_output_tokens: 600
    blend_weight: 0.4
    strength_scores:
      strong: 0.85
      weak: 0.3
    sentiment_scores:
      positive: 0.7
      negative: -0.7
      neutral: 0.0

  counterfactual:
    input_dim: 10
    hidden_dim: 128
    num_layers: 2
    dropout: 0.2
    learning_rate: 0.001
    batch_size: 32
    epochs: 100
  
thresholds:
  stable_regime: 0.5
  transition_regime: 1.5
  volatile_regime: 2.5
  
  warning_green: 0.3
  warning_yellow: 0.5
  warning_orange: 0.7
